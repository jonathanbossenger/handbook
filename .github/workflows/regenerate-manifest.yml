name: Regenerate Manifest

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate-manifest:
    name: Regenerate manifest
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up PHP environment
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 'latest'
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Composer dependencies & cache dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4

      - name: Install WP-CLI
        run: |
          curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar
          sudo mv wp-cli-nightly.phar /usr/local/bin/wp
          sudo chmod +x /usr/local/bin/wp

      - name: Generate handbook manifest
        run: wp handbook gen-hb-manifest
        env:
          WP_CLI_CONFIG_PATH: /dev/null

      - name: Commit and Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: |
            **This is an automated pull-request**

            Updates the `bin/handbook-manifest.json` file with the latest changes.
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b update-handbook-manifest
            git add bin/handbook-manifest.json
            git commit -m "Regenerate handbook manifest"
            git push --force-with-lease origin update-handbook-manifest
            
            PR_NUMBER=$(gh pr list --head update-handbook-manifest --json number --jq '.[0].number // empty')
            if [ -z "$PR_NUMBER" ]; then
              gh pr create \
                --title "Update handbook manifest" \
                --body "$PR_BODY" \
                --label "scope:distribution" \
                --base "${{ github.event.repository.default_branch }}" \
                --head "update-handbook-manifest" \
                --reviewer "swissspidy"
            else
              gh pr edit "$PR_NUMBER" \
                --title "Update handbook manifest" \
                --body "$PR_BODY" \
                --add-label "scope:distribution" \
                --base "${{ github.event.repository.default_branch }}"
            fi
          fi
